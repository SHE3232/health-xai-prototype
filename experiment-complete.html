<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>实验已完成</title>
    <link rel="icon" href="./favicon-ball.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="single-stimulus-shell survey-shell-page">
      <div class="screen cover-screen survey-screen">
        <div class="avatar-lockup">
          <div class="avatar-glow"></div>
          <div class="avatar-core">
            <span class="avatar-mark">V</span>
          </div>
        </div>
        <p class="screen-tag">Vita Health Study</p>
        <h4>实验已完成</h4>
        <p class="screen-copy">
          你已完成本次数字人健康建议实验的全部流程。感谢你的参与。
        </p>
        <p class="intro-meta is-ready">
          当前状态：所有问卷与任务已结束。现在可以直接关闭本页面。
        </p>

        <div class="note-card survey-launch-card">
          <strong>完成说明</strong>
          <p>
            本页仅用于提示实验已结束，不会再返回实验入口，也不会再进入任何条件页面。
          </p>
        </div>

        <div class="cta-stack">
          <div class="ghost-btn is-active survey-pill">实验已全部完成</div>
        </div>
      </div>
    </main>
  </body>
</html>
