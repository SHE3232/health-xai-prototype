<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>正式实验 G2</title>
    <link rel="icon" href="./favicon-ball.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="single-stimulus-shell">
      <div class="screen cover-screen">
        <div class="avatar-lockup">
          <div class="avatar-glow"></div>
          <div class="avatar-core">
            <span class="avatar-mark">V</span>
          </div>
        </div>
        <p class="screen-tag">Vita Health Study</p>
        <h4>顺序组 G2</h4>
        <p class="screen-copy">
          你将按 B → C → D → A 的顺序完成实验。点击开始后先进入前测，再进入第 1 轮条件 B。
        </p>
        <div class="cta-stack">
          <a class="primary-btn action-btn" href="./participant-entry.html?group=g2&condition=b">开始 G2 实验</a>
          <div class="ghost-btn is-active survey-pill">G2：B → C → D → A</div>
        </div>
      </div>
    </main>
  </body>
</html>
