<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>条件 D 展开态</title>
    <link rel="icon" href="./favicon-ball.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="single-stimulus-shell" data-condition="d" data-stage="stimulus">
      <div class="screen recommendation-screen compact-screen experiment-step-screen">
        <div class="status-bar">
          <span>9:45</span>
          <span>5G</span>
        </div>
        <div class="chat-hero">
          <div class="mini-avatar"><span class="mini-avatar-letter">V</span></div>
          <div>
            <p class="screen-tag">条件 D</p>
            <h4>Vita 建议</h4>
          </div>
        </div>
        <div class="message-card main-message">
          <p data-recommendation>请比平时提前45分钟入睡，并在晚饭后进行20分钟快走。</p>
        </div>
        <div class="viz-card">
          <div class="viz-chart">
            <div class="bar">
              <span class="bar-fill sleep" data-bar-key="sleep"></span>
              <span class="bar-label">睡眠</span>
            </div>
            <div class="bar">
              <span class="bar-fill sugar" data-bar-key="diet"></span>
              <span class="bar-label">饮食</span>
            </div>
            <div class="bar">
              <span class="bar-fill exercise" data-bar-key="exercise"></span>
              <span class="bar-label">运动</span>
            </div>
            <div class="bar">
              <span class="bar-fill stress" data-bar-key="stress"></span>
              <span class="bar-label">压力</span>
            </div>
          </div>
          <p class="viz-note" data-visual-note>当前最需要优先调整的是睡眠和运动。</p>
        </div>
        <div class="task-actions">
          <button class="ghost-btn action-btn is-active">已查看解释</button>
          <a class="primary-btn action-btn" href="./proto-d-complete.html?scene=scene-1">继续</a>
        </div>
      </div>
    </main>
    <script src="./prototype-scenarios.js"></script>
    <script src="./scenario-view.js"></script>
  </body>
</html>
