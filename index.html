<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vita 线上实验入口</title>
    <link rel="icon" href="./favicon-ball.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="single-stimulus-shell">
      <div class="screen cover-screen">
        <div class="status-bar">
          <span>9:41</span>
          <span>5G</span>
        </div>
        <div class="avatar-lockup">
          <div class="avatar-glow"></div>
          <div class="avatar-core">
            <span class="avatar-mark">V</span>
          </div>
        </div>
        <p class="screen-tag">Vita Online Experiment</p>
        <h4>数字人健康建议实验</h4>
        <p class="screen-copy">
          请选择对应顺序组入口。每位参与者会先完成一次前测，再依次体验四个解释条件，全部完成后进入 Final 问卷。
        </p>
        <div class="cta-stack">
          <a class="primary-btn action-btn" href="./g1.html">正式实验 G1</a>
          <a class="ghost-btn action-btn" href="./g2.html">正式实验 G2</a>
          <a class="ghost-btn action-btn" href="./g3.html">正式实验 G3</a>
          <a class="ghost-btn action-btn" href="./g4.html">正式实验 G4</a>
        </div>
      </div>
    </main>
  </body>
</html>
