<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>实验前测</title>
    <link rel="icon" href="./favicon-ball.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="single-stimulus-shell survey-shell-page">
      <div class="screen cover-screen survey-screen">
        <div class="avatar-lockup">
          <div class="avatar-glow"></div>
          <div class="avatar-core">
            <span class="avatar-mark">V</span>
          </div>
        </div>
        <p class="screen-tag">Vita Health Study</p>
        <h4>开始实验前请先完成前测</h4>
        <p class="screen-copy" id="pretest-copy">
          前测问卷会以内嵌面板形式显示在当前页面中。完成并提交后，关闭问卷面板，再继续进入实验。
        </p>
        <p class="intro-meta" id="pretest-status">当前状态：请先打开前测问卷面板。</p>

        <div class="note-card survey-launch-card">
          <strong id="survey-launch-title">前测问卷</strong>
          <p id="survey-launch-copy">
            点击下方按钮后，系统会在当前页面内展开问卷面板。提交成功后，关闭面板并返回本页继续。
          </p>
        </div>

        <div class="cta-stack">
          <button class="ghost-btn action-btn" id="open-survey-btn" type="button">打开前测问卷面板</button>
          <button class="primary-btn action-btn is-disabled" id="continue-btn" type="button">
            我已提交前测，进入第 1 轮
          </button>
          <div class="ghost-btn is-active survey-pill" id="condition-pill">顺序加载中</div>
        </div>
      </div>
    </main>
    <script src="./prototype-scenarios.js"></script>
    <script src="./participant-entry.js"></script>
  </body>
</html>
